# .github/workflows/ci.yml
#
# GitHub Actions workflow for ReeFi MQTT Bridge
# - Runs linting and tests on every push/PR
# - Validates configuration examples
# - Optionally deploys to server on main branch

name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint
          
      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings (non-blocking)
          flake8 . --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics --exclude=tests,docs
          
      - name: Check syntax
        run: |
          python -m py_compile reefi_mqtt.py
          
      - name: Validate config example
        run: |
          pip install PyYAML
          python -c "import yaml; yaml.safe_load(open('config.example.yaml'))"
          echo "✓ config.example.yaml is valid YAML"

  test:
    runs-on: ubuntu-latest
    needs: lint
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Test imports
        run: |
          python -c "import paho.mqtt.client as mqtt; print('✓ paho-mqtt imported')"
          python -c "import requests; print('✓ requests imported')"
          
      - name: Run unit tests (if present)
        run: |
          if [ -d "tests" ]; then
            pip install pytest pytest-cov
            pytest tests/ -v --tb=short
          else
            echo "No tests directory found, skipping tests"
          fi
          
      - name: Validate documentation
        if: matrix.python-version == '3.11'
        run: |
          pip install markdown
          python -m markdown README.md > /dev/null
          python -m markdown QUICKSTART.md > /dev/null
          python -m markdown docs/INSTALLATION.md > /dev/null

  security:
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Security scan with Bandit
        run: |
          pip install bandit
          bandit -r . -f json -o bandit-report.json || true
          bandit -r . --severity-level medium
          
      - name: Check for secrets in example files
        run: |
          # Ensure example files don't contain real credentials
          if grep -i "password.*:" config.example.yaml | grep -v "null" | grep -v "#"; then
            echo "❌ Found potential real password in example config!"
            exit 1
          fi
          if grep -i "broker.*:" config.example.yaml | grep -v "localhost" | grep -v "#" | grep -v "192.168" | grep -E "[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}"; then
            echo "❌ Found real IP in example config!"
            exit 1
          fi
          echo "✓ No credentials in example files"

  shellcheck:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          ignore_paths: 'tests'
          severity: warning

  build-docs:
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build documentation
        run: |
          echo "✓ README.md present"
          echo "✓ QUICKSTART.md present"
          echo "✓ CHANGELOG.md present"
          echo "✓ LICENSE present"
          test -f README.md
          test -f QUICKSTART.md
          test -f CHANGELOG.md
          test -f LICENSE
          
      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/markdown-link-check-config.json'
        continue-on-error: true

